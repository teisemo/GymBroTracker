<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0b;--bg2:#111114;--bg3:#18181c;
  --surface:#1e1e24;--border:#2a2a35;--border2:#35353f;
  --text:#e8e8ee;--text2:#9090a0;--text3:#55556a;
  --accent:#d4f442;--accent2:#b8da1a;--accent-dim:#1e2a05;
  --red:#ff4f4f;--red-dim:#2a0f0f;
  --green:#4ade80;--green-dim:#0d2a18;
  --sidebar-w:220px;
  --fh:'Bebas Neue',sans-serif;
  --fb:'DM Sans',sans-serif;
  --fm:'DM Mono',monospace;
}
html{font-size:15px}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

/* SCREENS */
.screen{display:none}
.screen.active{display:flex}

/* AUTH */
#auth-screen{min-height:100vh;align-items:center;justify-content:center;position:relative;overflow:hidden}
.auth-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,#1a2a05 0%,transparent 70%)}
.auth-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,black 0%,transparent 100%)}
.auth-card{position:relative;z-index:1;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 40px 80px rgba(0,0,0,.6)}
.auth-logo{font-family:var(--fh);font-size:3rem;letter-spacing:2px;line-height:1;margin-bottom:6px}
.lt{color:var(--text)}.la{color:var(--accent)}
.auth-sub{color:var(--text2);font-size:.85rem;margin-bottom:28px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:24px;gap:3px}
.auth-tab{flex:1;padding:7px;border:none;border-radius:6px;background:transparent;color:var(--text2);font-family:var(--fb);font-size:.85rem;cursor:pointer;transition:all .15s}
.auth-tab.active{background:var(--surface);color:var(--text);font-weight:500}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.75rem;color:var(--text2);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
.fg input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--fb);font-size:.95rem;outline:none;transition:border-color .15s}
.fg input:focus{border-color:var(--accent)}
.auth-err{background:var(--red-dim);border:1px solid var(--red);border-radius:8px;padding:10px 14px;font-size:.85rem;color:var(--red);margin-bottom:16px}
.btn-primary{width:100%;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#0a0a0b;font-family:var(--fb);font-size:.95rem;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:active{transform:scale(.98)}

/* APP LAYOUT */
#app-screen{min-height:100vh;flex-direction:row}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 12px;gap:4px;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .25s ease}
.sb-head{font-family:var(--fh);font-size:1.6rem;letter-spacing:2px;padding:0 8px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.ltsm{color:var(--text)}.lasm{color:var(--accent)}
.user-pill{display:flex;align-items:center;gap:10px;padding:10px;margin-bottom:16px;background:var(--bg3);border-radius:10px}
.u-av{width:34px;height:34px;border-radius:50%;background:var(--accent-dim);border:1.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:1rem;color:var(--accent);flex-shrink:0}
.u-name{display:block;font-size:.85rem;font-weight:500;color:var(--text);line-height:1.2}
.u-email{display:block;font-size:.72rem;color:var(--text3)}
.nsl{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:6px 10px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--text2);font-size:.88rem;font-weight:400;text-decoration:none;transition:all .12s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-out{margin-top:auto;color:var(--text3)}
.nav-out:hover{background:var(--red-dim);color:var(--red)}

/* MOBILE HEADER */
.mob-head{display:none;position:fixed;top:0;left:0;right:0;z-index:90;background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;align-items:center;gap:12px;font-family:var(--fh);font-size:1.4rem;letter-spacing:2px}
.hburg{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:4px}
.hburg span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px}
.sb-overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.5)}

/* MAIN */
.main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
.page{display:none;flex-direction:column;flex:1;padding:32px;max-width:900px}
.page.active{display:flex}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.page-title{font-family:var(--fh);font-size:2.4rem;letter-spacing:1px;color:var(--text);line-height:1}
.page-sub{font-size:.82rem;color:var(--text2);margin-top:4px}

/* PILLS */
.all-pills{display:flex;gap:6px}
.pill{padding:6px 16px;border-radius:99px;border:1.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--fb);font-size:.82rem;font-weight:500;cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#0a0a0b}

/* SESSION BAR */
.sess-bar{display:flex;align-items:center;gap:8px;margin-bottom:24px}
.sess-arr{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);width:28px;height:28px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center}
.sess-arr:hover{border-color:var(--accent);color:var(--accent)}
.sess-dots{display:flex;gap:5px}
.sess-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer;transition:all .15s;border:none}
.sess-dot.active{background:var(--text2);transform:scale(1.3)}
.sess-dot.filled{background:var(--accent)}
.sess-lbl{font-size:.8rem;color:var(--text3);margin-left:4px}
.save-st{font-size:.78rem;color:var(--green);opacity:0;transition:opacity .4s;margin-left:8px}
.save-st.show{opacity:1}

/* EXERCISE BLOCKS */
.ex-block{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;background:var(--bg2)}
.ex-hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border)}
.ex-name{font-size:.9rem;font-weight:600;color:var(--text);flex:1;letter-spacing:.3px}
.ex-range{font-size:.75rem;color:var(--text2)}
.ex-tempo{font-family:var(--fm);font-size:.75rem;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:4px}
.col-hdrs{display:grid;grid-template-columns:1fr 90px 90px 36px;background:var(--bg3);border-bottom:1px solid var(--border)}
.col-h{font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:5px 10px;text-align:center}
.col-h:first-child{text-align:left}
.sr{display:grid;grid-template-columns:1fr 90px 90px 36px;align-items:stretch;border-bottom:1px solid var(--border);transition:background .1s}
.sr:last-child{border-bottom:none}
.sr:hover{background:var(--bg3)}
.sr.done-row{background:#0d1f0f}
.sr.done-row:hover{background:#0f2412}
.sl{display:flex;align-items:center;padding:9px 16px;font-size:.8rem;color:var(--text2)}
.sl.risc{font-style:italic;color:var(--text3)}
.sl.allmax{color:var(--accent);font-weight:500}
.ic{border-left:1px solid var(--border);display:flex;align-items:center}
.ic input{width:100%;border:none;background:transparent;text-align:center;font-family:var(--fm);font-size:.88rem;color:var(--text);padding:8px 4px;outline:none}
.ic input:focus{background:rgba(212,244,66,.05)}
.ic input.done{color:var(--green)}
.ic input::placeholder{color:var(--text3);font-size:.78rem}
.cc{border-left:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.cb{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border2);background:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.cb:hover{border-color:var(--accent)}
.cb.done{background:var(--green);border-color:var(--green)}
.cb.done::after{content:'✓';font-size:11px;color:#0a0a0b;font-weight:700}

/* FOOTER */
.trk-foot{display:flex;align-items:center;gap:20px;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);flex-wrap:wrap}
.cbar-wrap{flex:1;min-width:180px}
.cbar-lbl{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text2);margin-bottom:6px}
.cbar{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
.cbar-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease;width:0%}
.btn-save{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;background:var(--accent);border:none;color:#0a0a0b;font-family:var(--fb);font-size:.88rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-save:hover{background:var(--accent2)}
.btn-save:active{transform:scale(.97)}

/* HISTORY */
.frow{display:flex;gap:8px;flex-wrap:wrap}
.selx{padding:7px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--fb);font-size:.82rem;outline:none;cursor:pointer}
.selx:focus{border-color:var(--accent)}
.hist-list{display:flex;flex-direction:column;gap:10px}
.hcard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;transition:border-color .15s}
.hcard:hover{border-color:var(--border2)}
.h-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.h-badge{font-family:var(--fh);font-size:.95rem;letter-spacing:1px;color:var(--accent);background:var(--accent-dim);padding:2px 10px;border-radius:6px}
.h-user{font-size:.85rem;font-weight:500}
.h-date{font-size:.78rem;color:var(--text2);margin-left:auto}
.h-exs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.h-tag{font-size:.72rem;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--text2)}

/* STATS */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px}
.scard-name{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:4px}
.scard-val{font-family:var(--fh);font-size:2rem;letter-spacing:1px;color:var(--accent);line-height:1.1}
.scard-unit{font-size:.8rem;color:var(--text2)}
.scard-d{font-size:.78rem;margin-top:4px;color:var(--green)}
.scard-d.neg{color:var(--red)}
.spark{display:flex;align-items:flex-end;gap:3px;height:30px;margin-top:8px}
.sbar{flex:1;background:var(--accent-dim);border-radius:2px;min-height:3px}
.sbar.lat{background:var(--accent)}
.shist{margin-top:10px;display:flex;flex-direction:column;gap:3px}
.shrow{display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--text3);border-top:1px solid var(--border);padding-top:4px;margin-top:4px}
.shval{font-family:var(--fm);color:var(--text2)}

/* UTILS */
.hidden{display:none!important}
.empty{padding:48px 20px;text-align:center;color:var(--text3);font-size:.88rem;border:1px dashed var(--border);border-radius:12px}
.spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(0,0,0,.2);border-top-color:#0a0a0b;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:20px 0 60px rgba(0,0,0,.5)}
  .sb-overlay.show{display:block}
  .mob-head{display:flex}
  .main-content{margin-left:0;padding-top:56px}
  .page{padding:20px 16px}
  .page-title{font-size:2rem}
  .page-hdr{margin-bottom:20px}
  .col-hdrs,.sr{grid-template-columns:1fr 75px 75px 34px}
  .sl{padding:8px 10px;font-size:.75rem}
  .sgrid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ════════ AUTH ════════ -->
<div id="auth-screen" class="screen active">
  <div class="auth-bg"><div class="auth-grid"></div></div>
  <div class="auth-card">
    <div class="auth-logo"><span class="lt">GYM</span><span class="la">TRACKER</span></div>
    <p class="auth-sub">Traccia i tuoi progressi</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Accedi</button>
      <button class="auth-tab" onclick="switchTab('signup')">Registrati</button>
    </div>
    <form onsubmit="handleAuth(event)">
      <div class="fg hidden" id="f-name">
        <label>Nome visualizzato</label>
        <input type="text" id="inp-name" placeholder="Es. Marco" autocomplete="name">
      </div>
      <div class="fg">
        <label>Email</label>
        <input type="email" id="inp-email" placeholder="email@esempio.it" required autocomplete="email">
      </div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="inp-pwd" placeholder="••••••••" required autocomplete="current-password" minlength="6">
      </div>
      <div class="auth-err hidden" id="auth-err"></div>
      <button type="submit" class="btn-primary">
        <span id="btn-txt">Accedi</span>
        <div class="spinner hidden" id="auth-spin"></div>
      </button>
    </form>
  </div>
</div>

<!-- ════════ APP ════════ -->
<div id="app-screen" class="screen">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sb-head"><span class="ltsm">GYM</span><span class="lasm">TRACKER</span></div>
    <div class="user-pill">
      <div class="u-av" id="u-av">?</div>
      <div><span class="u-name" id="u-name">Utente</span><span class="u-email" id="u-email">—</span></div>
    </div>
    <div class="nsl">Allenamenti</div>
    <a href="#" class="nav-item active" onclick="showPage('tracker',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>Scheda
    </a>
    <a href="#" class="nav-item" onclick="showPage('history',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>Storico
    </a>
    <a href="#" class="nav-item" onclick="showPage('stats',this)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Progressi
    </a>
    <div class="nsl" style="margin-top:auto">Account</div>
    <button class="nav-item nav-out" onclick="doLogout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Esci
    </button>
  </nav>

  <!-- MOBILE -->
  <div class="mob-head">
    <button class="hburg" onclick="toggleSB()"><span></span><span></span><span></span></button>
    <span class="ltsm">GYM</span><span class="lasm">TRACKER</span>
  </div>
  <div class="sb-overlay" id="sb-ov" onclick="closeSB()"></div>

  <!-- MAIN -->
  <main class="main-content">

    <!-- TRACKER -->
    <div id="page-tracker" class="page active">
      <div class="page-hdr">
        <div><h1 class="page-title">Scheda</h1><p class="page-sub" id="today"></p></div>
        <div class="all-pills">
          <button class="pill active" onclick="selAll(0,this)">A1</button>
          <button class="pill" onclick="selAll(1,this)">A2</button>
          <button class="pill" onclick="selAll(2,this)">A3</button>
        </div>
      </div>
      <div class="sess-bar">
        <button class="sess-arr" onclick="chSess(-1)">‹</button>
        <div class="sess-dots" id="s-dots"></div>
        <button class="sess-arr" onclick="chSess(1)">›</button>
        <span class="sess-lbl" id="s-lbl">Sessione 1/5</span>
        <span class="save-st" id="save-st"></span>
      </div>
      <div id="ex-cont"></div>
      <div class="trk-foot">
        <div class="cbar-wrap">
          <div class="cbar-lbl"><span>Completamento</span><span id="cpct">0%</span></div>
          <div class="cbar"><div class="cbar-fill" id="cfill"></div></div>
        </div>
        <button class="btn-save" onclick="saveSession()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Salva sessione
        </button>
      </div>
    </div>

    <!-- STORICO -->
    <div id="page-history" class="page">
      <div class="page-hdr">
        <div><h1 class="page-title">Storico</h1><p class="page-sub">Tutte le sessioni salvate</p></div>
        <div class="frow">
          <select class="selx" id="hf-user" onchange="loadHistory()"><option value="">Tutti gli utenti</option></select>
          <select class="selx" id="hf-all" onchange="loadHistory()">
            <option value="">Tutti gli allenamenti</option>
            <option value="0">Allenamento 1</option>
            <option value="1">Allenamento 2</option>
            <option value="2">Allenamento 3</option>
          </select>
        </div>
      </div>
      <div class="hist-list" id="hist-list"><div class="empty">Usa i filtri per caricare lo storico</div></div>
    </div>

    <!-- PROGRESSI -->
    <div id="page-stats" class="page">
      <div class="page-hdr">
        <div><h1 class="page-title">Progressi</h1><p class="page-sub">Evoluzione dei carichi</p></div>
        <div class="frow">
          <select class="selx" id="sf-user" onchange="loadStats()"><option value="">Il mio profilo</option></select>
        </div>
      </div>
      <div class="sgrid" id="sgrid"><div class="empty">Caricamento...</div></div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ══════════════════════════════════════════════════════════
//  ⚙️  CONFIGURAZIONE — sostituisci con le tue credenziali
// ══════════════════════════════════════════════════════════
const SUPABASE_URL     = 'https://TUOPROJECT.supabase.co';
const SUPABASE_ANON_KEY = 'eyJ...';

// ── DATI ALLENAMENTO ──────────────────────────────────────
const ALLENAMENTI = [
  { nome:"Allenamento 1", esercizi:[
    {nome:"LEG EXTENSIONS",  tempo:"3111",range:"6-10"},
    {nome:"LEG CURL",        tempo:"3111",range:"6-10"},
    {nome:"PANCA PIANA",     tempo:"3111",range:"6-10"},
    {nome:"LAT MACHINE",     tempo:"2111",range:"6-10"},
    {nome:"HAMMER CURL",     tempo:"3111",range:"6-10"},
  ]},
  { nome:"Allenamento 2", esercizi:[
    {nome:"STACCO DA TERRA",      tempo:"3111",range:"6-10"},
    {nome:"TRAZIONI ALLA SBARRA", tempo:"3111",range:"6-10"},
    {nome:"PARALLELE",            tempo:"3111",range:"6-10"},
    {nome:"SPINTE PER LE SPALLE", tempo:"3111",range:"6-10"},
    {nome:"CURL AL CAVO",         tempo:"3111",range:"6-10"},
  ]},
  { nome:"Allenamento 3", esercizi:[
    {nome:"SQUAT",                   tempo:"2111",range:"6-10"},
    {nome:"REMATORE",                tempo:"3111",range:"6-10"},
    {nome:"CROCI SU PANCA INCLINATA",tempo:"3111",range:"6-10"},
    {nome:"ALZATE LATERALI",         tempo:"2111",range:"6-10"},
    {nome:"SPINTE IN BASSO BARRA",   tempo:"3111",range:"6-10"},
  ]},
];
const SERIE_DEFS = [
  {label:"1ª serie riscaldamento — 10 rip", type:"risc"},
  {label:"2ª serie riscaldamento — 6 rip",  type:"risc"},
  {label:"3ª serie allenante — 8 rip",       type:"all"},
  {label:"4ª serie allenante — MAX rip",     type:"allmax"},
];
const NUM_SESS = 5;

// ── STATE ─────────────────────────────────────────────────
let sb, curUser=null, curAll=0, curSess=0, sessMeta=[], autoTimer=null, profiles=[];
let authMode='login';

// ── BOOT ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  document.getElementById('today').textContent =
    new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  sb.auth.onAuthStateChange(async (ev, session) => {
    if (session) { curUser = session.user; await onLogin(session.user); }
    else         { curUser = null; showScreen('auth-screen'); }
  });

  const {data} = await sb.auth.getSession();
  if (!data.session) showScreen('auth-screen');
});

// ── UI HELPERS ────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  closeSB();
  if(id==='history') loadHistory();
  if(id==='stats')   loadStats();
}
function toggleSB(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sb-ov').classList.toggle('show')}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sb-ov').classList.remove('show')}

// ── AUTH ──────────────────────────────────────────────────
function switchTab(mode){
  authMode=mode;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>
    t.classList.toggle('active',(i===0&&mode==='login')||(i===1&&mode==='signup')));
  document.getElementById('f-name').classList.toggle('hidden',mode!=='signup');
  document.getElementById('btn-txt').textContent=mode==='login'?'Accedi':'Registrati';
  document.getElementById('auth-err').classList.add('hidden');
}

async function handleAuth(e){
  e.preventDefault();
  const email=document.getElementById('inp-email').value.trim();
  const pwd  =document.getElementById('inp-pwd').value;
  const name =document.getElementById('inp-name').value.trim();
  const errEl=document.getElementById('auth-err');
  const spin =document.getElementById('auth-spin');
  const btxt =document.getElementById('btn-txt');
  errEl.classList.add('hidden');
  spin.classList.remove('hidden');
  btxt.classList.add('hidden');
  try {
    if(authMode==='login'){
      const {error}=await sb.auth.signInWithPassword({email,password:pwd});
      if(error) throw error;
    } else {
      const {data,error}=await sb.auth.signUp({email,password:pwd,options:{data:{display_name:name}}});
      if(error) throw error;
      if(data.user) await upsertProfile(data.user.id,email,name);
    }
  } catch(err){
    errEl.textContent=xlErr(err.message);
    errEl.classList.remove('hidden');
  } finally {
    spin.classList.add('hidden');
    btxt.classList.remove('hidden');
  }
}
function xlErr(m){
  if(m.includes('Invalid login')) return 'Email o password non corretti.';
  if(m.includes('already registered')) return 'Email già registrata. Accedi invece.';
  if(m.includes('Password should')) return 'Password di almeno 6 caratteri.';
  return m;
}
async function doLogout(){ await sb.auth.signOut(); }

// ── ON LOGIN ──────────────────────────────────────────────
async function onLogin(user){
  await upsertProfile(user.id, user.email, user.user_metadata?.display_name);
  const name=user.user_metadata?.display_name||user.email.split('@')[0];
  document.getElementById('u-av').textContent   = name[0].toUpperCase();
  document.getElementById('u-name').textContent = name;
  document.getElementById('u-email').textContent= user.email;
  try {
    const {data}=await sb.from('profiles').select('id,display_name,email').order('display_name');
    profiles=data||[];
    ['hf-user','sf-user'].forEach(id=>{
      const sel=document.getElementById(id);
      [...sel.options].forEach(o=>{if(o.value)sel.remove(o.index)});
      profiles.forEach(p=>{
        const o=document.createElement('option');
        o.value=p.id; o.textContent=p.display_name||p.email;
        if(id==='sf-user'&&p.id===curUser.id) o.selected=true;
        sel.appendChild(o);
      });
    });
  } catch(e){ console.warn('profiles',e); }
  showScreen('app-screen');
  await renderTracker();
}

// ── DB HELPERS ────────────────────────────────────────────
async function upsertProfile(id,email,name){
  await sb.from('profiles').upsert(
    {id,email,display_name:name||email.split('@')[0],updated_at:new Date().toISOString()},
    {onConflict:'id'}
  );
}
async function saveSessDB(seriesData){
  const {error}=await sb.from('workout_sessions').upsert({
    user_id:curUser.id, allenamento_idx:curAll, session_idx:curSess,
    session_date:new Date().toISOString().split('T')[0],
    series_data:seriesData, updated_at:new Date().toISOString()
  },{onConflict:'user_id,allenamento_idx,session_idx'});
  if(error) throw error;
}
async function loadSessDB(){
  const {data}=await sb.from('workout_sessions').select('*')
    .eq('user_id',curUser.id).eq('allenamento_idx',curAll).eq('session_idx',curSess).maybeSingle();
  return data;
}
async function loadMetaDB(){
  const {data}=await sb.from('workout_sessions').select('session_idx')
    .eq('user_id',curUser.id).eq('allenamento_idx',curAll);
  return data||[];
}

// ── TRACKER ───────────────────────────────────────────────
function selAll(idx,btn){
  curAll=idx; curSess=0;
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  renderTracker();
}
function chSess(d){ const n=curSess+d; if(n<0||n>=NUM_SESS)return; curSess=n; renderTracker(); }

async function renderTracker(){
  if(!curUser) return;
  try { sessMeta=await loadMetaDB(); } catch(e){ sessMeta=[]; }
  renderDots();
  let saved=null;
  try { saved=await loadSessDB(); } catch(e){}
  renderEx(saved);
  updateCbar();
}

function renderDots(){
  const c=document.getElementById('s-dots'); c.innerHTML='';
  for(let i=0;i<NUM_SESS;i++){
    const b=document.createElement('button');
    b.className='sess-dot';
    if(i===curSess) b.classList.add('active');
    if(sessMeta.find(m=>m.session_idx===i)) b.classList.add('filled');
    b.onclick=()=>{curSess=i;renderTracker()};
    c.appendChild(b);
  }
  document.getElementById('s-lbl').textContent=`Sessione ${curSess+1}/${NUM_SESS}`;
}

function renderEx(saved){
  const all=ALLENAMENTI[curAll];
  const sd=saved?.series_data||{};
  let h='';
  all.esercizi.forEach((ex,ei)=>{
    h+=`<div class="ex-block">
      <div class="ex-hdr">
        <span class="ex-name">${ex.nome}</span>
        <span class="ex-range">${ex.range} rip</span>
        <span class="ex-tempo">${ex.tempo}</span>
      </div>
      <div class="col-hdrs">
        <div class="col-h" style="text-align:left">Serie</div>
        <div class="col-h">Kg</div><div class="col-h">Rip</div><div class="col-h"></div>
      </div>`;
    SERIE_DEFS.forEach((s,si)=>{
      const sv=(sd[ei]||{})[si]||{};
      const done=!!sv.done;
      h+=`<div class="sr${done?' done-row':''}">
        <div class="sl ${s.type}">${s.label}</div>
        <div class="ic"><input type="number" min="0" step="0.5" placeholder="kg"
          id="kg_${ei}_${si}" value="${sv.kg||''}" class="${done?'done':''}" oninput="schedAuto()"></div>
        <div class="ic"><input type="number" min="0" step="1" placeholder="rip"
          id="rp_${ei}_${si}" value="${sv.rip||''}" class="${done?'done':''}" oninput="schedAuto()"></div>
        <div class="cc"><button class="cb${done?' done':''}" id="cb_${ei}_${si}"
          onclick="togDone(${ei},${si})"></button></div>
      </div>`;
    });
    h+=`</div>`;
  });
  document.getElementById('ex-cont').innerHTML=h;
}

function togDone(ei,si){
  const btn=document.getElementById(`cb_${ei}_${si}`);
  const kg =document.getElementById(`kg_${ei}_${si}`);
  const rp =document.getElementById(`rp_${ei}_${si}`);
  const row=btn.closest('.sr');
  const d=!btn.classList.contains('done');
  btn.classList.toggle('done',d);
  kg.classList.toggle('done',d);
  rp.classList.toggle('done',d);
  row.classList.toggle('done-row',d);
  schedAuto(); updateCbar();
}

function collectData(){
  const d={};
  ALLENAMENTI[curAll].esercizi.forEach((_,ei)=>{
    d[ei]={};
    SERIE_DEFS.forEach((_,si)=>{
      const kg =document.getElementById(`kg_${ei}_${si}`);
      const rp =document.getElementById(`rp_${ei}_${si}`);
      const cb =document.getElementById(`cb_${ei}_${si}`);
      d[ei][si]={kg:kg?kg.value:'',rip:rp?rp.value:'',done:cb?cb.classList.contains('done'):false};
    });
  });
  return d;
}

function updateCbar(){
  const all=ALLENAMENTI[curAll];
  let tot=0,dn=0;
  all.esercizi.forEach((_,ei)=>SERIE_DEFS.forEach((_,si)=>{
    tot++;
    const b=document.getElementById(`cb_${ei}_${si}`);
    if(b&&b.classList.contains('done')) dn++;
  }));
  const p=tot>0?Math.round(dn/tot*100):0;
  document.getElementById('cpct').textContent=p+'%';
  document.getElementById('cfill').style.width=p+'%';
}

function schedAuto(){ clearTimeout(autoTimer); autoTimer=setTimeout(()=>saveSession(true),1200); }

async function saveSession(silent=false){
  if(!curUser) return;
  try {
    await saveSessDB(collectData());
    showSt(silent?'✓ Auto-salvato':'✓ Salvato');
    sessMeta=await loadMetaDB();
    renderDots();
  } catch(e){
    console.error(e);
    if(!silent) showSt('⚠ Errore salvataggio');
  }
}
function showSt(msg){
  const el=document.getElementById('save-st');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ── STORICO ───────────────────────────────────────────────
async function loadHistory(){
  const uf=document.getElementById('hf-user').value;
  const af=document.getElementById('hf-all').value;
  const el=document.getElementById('hist-list');
  el.innerHTML='<div class="empty">Caricamento...</div>';
  try {
    let q=sb.from('workout_sessions').select('*,profiles(display_name,email)')
      .order('updated_at',{ascending:false}).limit(100);
    if(uf) q=q.eq('user_id',uf);
    if(af!=='') q=q.eq('allenamento_idx',parseInt(af));
    const {data,error}=await q;
    if(error) throw error;
    if(!data.length){el.innerHTML='<div class="empty">Nessuna sessione trovata</div>';return;}
    el.innerHTML=data.map(s=>{
      const pn=s.profiles?.display_name||s.profiles?.email||'—';
      const an=ALLENAMENTI[s.allenamento_idx]?.nome||`Allenamento ${s.allenamento_idx+1}`;
      const dt=s.session_date?new Date(s.session_date).toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'}):'—';
      let tot=0,dn=0;
      const sd=s.series_data||{};
      Object.values(sd).forEach(ex=>Object.values(ex).forEach(sr=>{tot++;if(sr.done)dn++}));
      const pct=tot>0?Math.round(dn/tot*100):0;
      const all=ALLENAMENTI[s.allenamento_idx];
      const tags=all?all.esercizi.map((ex,ei)=>{
        const exd=sd[ei]||{};
        const mk=Math.max(...Object.values(exd).map(r=>parseFloat(r.kg)||0).filter(v=>v>0),0);
        return `<span class="h-tag">${ex.nome.split(' ').slice(0,2).join(' ')}${mk>0?` · ${mk}kg`:''}</span>`;
      }).join(''):'';
      return `<div class="hcard">
        <div class="h-top">
          <span class="h-badge">${an.replace('Allenamento','A')}</span>
          <span class="h-user">${pn}</span>
          <span style="font-size:.75rem;color:var(--text3)">Sess.${s.session_idx+1}</span>
          <span class="h-date">${dt}</span>
        </div>
        <div style="font-size:.75rem;color:var(--text2);margin-bottom:6px">
          Completamento: <strong style="color:${pct===100?'var(--green)':'var(--text)'}">${pct}%</strong> (${dn}/${tot} serie)
        </div>
        <div class="h-exs">${tags}</div>
      </div>`;
    }).join('');
  } catch(e){ el.innerHTML=`<div class="empty">Errore: ${e.message}</div>`; }
}

// ── PROGRESSI ─────────────────────────────────────────────
async function loadStats(){
  const uid=document.getElementById('sf-user').value||curUser.id;
  const el=document.getElementById('sgrid');
  el.innerHTML='<div class="empty">Caricamento...</div>';
  try {
    let q=sb.from('workout_sessions')
      .select('allenamento_idx,session_date,series_data,updated_at,profiles(display_name)')
      .order('updated_at',{ascending:true});
    if(uid) q=q.eq('user_id',uid);
    const {data,error}=await q;
    if(error) throw error;
    if(!data?.length){el.innerHTML='<div class="empty">Nessun dato ancora. Salva qualche sessione!</div>';return;}
    const exData={};
    data.forEach(sess=>{
      const all=ALLENAMENTI[sess.allenamento_idx];
      if(!all) return;
      const sd=sess.series_data||{};
      const dt=sess.session_date||sess.updated_at?.split('T')[0];
      all.esercizi.forEach((ex,ei)=>{
        const exd=sd[ei]||{};
        const kgs=[2,3].map(si=>parseFloat((exd[si]||{}).kg)||0).filter(v=>v>0);
        if(!kgs.length) return;
        if(!exData[ex.nome]) exData[ex.nome]=[];
        exData[ex.nome].push({date:dt,kg:Math.max(...kgs)});
      });
    });
    if(!Object.keys(exData).length){el.innerHTML='<div class="empty">Nessun carico registrato ancora.</div>';return;}
    el.innerHTML=Object.entries(exData).map(([name,entries])=>{
      entries.sort((a,b)=>a.date?.localeCompare(b.date));
      const lat=entries[entries.length-1];
      const prev=entries[entries.length-2];
      const delta=prev?lat.kg-prev.kg:null;
      const spark=entries.slice(-8);
      const smax=Math.max(...spark.map(e=>e.kg),1);
      const bars=spark.map((e,i)=>{
        const h=Math.round((e.kg/smax)*28)+2;
        return `<div class="sbar${i===spark.length-1?' lat':''}" style="height:${h}px"></div>`;
      }).join('');
      const hist=entries.slice(-4).reverse().map(e=>`
        <div class="shrow"><span>${e.date||'—'}</span><span class="shval">${e.kg} kg</span></div>`).join('');
      const dh=delta!==null?`<div class="scard-d${delta<0?' neg':''}">${delta>=0?'+':''}${delta.toFixed(1)} kg vs prec.</div>`:'';
      return `<div class="scard">
        <div class="scard-name">${name}</div>
        <div class="scard-val">${lat.kg} <span class="scard-unit">kg</span></div>
        ${dh}
        <div class="spark">${bars}</div>
        <div class="shist">${hist}</div>
      </div>`;
    }).join('');
  } catch(e){ el.innerHTML=`<div class="empty">Errore: ${e.message}</div>`; }
}
</script>
</body>
</html>

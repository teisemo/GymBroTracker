<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen active">
  <div class="auth-bg">
    <div class="auth-grid"></div>
  </div>
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-text">GYM</span>
      <span class="logo-accent">TRACKER</span>
    </div>
    <p class="auth-subtitle">Traccia i tuoi progressi</p>

    <div id="auth-tabs" class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Accedi</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">Registrati</button>
    </div>

    <form id="auth-form" onsubmit="handleAuth(event)">
      <div id="signup-name-field" class="form-group hidden">
        <label>Nome visualizzato</label>
        <input type="text" id="display-name" placeholder="Es. Marco" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="auth-email" placeholder="email@esempio.it" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="auth-password" placeholder="••••••••" required autocomplete="current-password" minlength="6">
      </div>
      <div id="auth-error" class="auth-error hidden"></div>
      <button type="submit" class="btn-primary" id="auth-submit">
        <span id="auth-btn-text">Accedi</span>
        <div id="auth-spinner" class="spinner hidden"></div>
      </button>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-screen" class="screen">

  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo-text-sm">GYM</span><span class="logo-accent-sm">TRACKER</span>
    </div>

    <div class="user-pill" id="user-pill">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-info">
        <span class="user-name" id="user-name">Utente</span>
        <span class="user-email" id="user-email">—</span>
      </div>
    </div>

    <div class="nav-section-label">Allenamenti</div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" onclick="showPage('tracker',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
        Scheda
      </a>
      <a href="#" class="nav-item" onclick="showPage('history',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        Storico
      </a>
      <a href="#" class="nav-item" onclick="showPage('stats',this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Progressi
      </a>
    </nav>

    <div class="nav-section-label" style="margin-top:auto">Account</div>
    <button class="nav-item nav-logout" onclick="handleLogout()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Esci
    </button>
  </nav>

  <!-- MOBILE HEADER -->
  <div class="mobile-header">
    <button class="hamburger" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </button>
    <span class="logo-text-sm">GYM</span><span class="logo-accent-sm">TRACKER</span>
  </div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- PAGE: TRACKER -->
    <div id="page-tracker" class="page active">
      <div class="page-header">
        <div>
          <h1 class="page-title">Scheda</h1>
          <p class="page-sub" id="today-date">—</p>
        </div>
        <div class="header-actions">
          <div class="allenamento-pills" id="allenamento-pills">
            <button class="pill active" onclick="selectAllenamento(0,this)">A1</button>
            <button class="pill" onclick="selectAllenamento(1,this)">A2</button>
            <button class="pill" onclick="selectAllenamento(2,this)">A3</button>
          </div>
        </div>
      </div>

      <div class="session-bar">
        <button class="sess-arrow" onclick="changeSession(-1)">‹</button>
        <div class="sess-dots" id="sess-dots"></div>
        <button class="sess-arrow" onclick="changeSession(1)">›</button>
        <span class="sess-label" id="sess-label">Sessione 1/5</span>
        <span class="save-status" id="save-status"></span>
      </div>

      <div id="exercises-container"></div>

      <div class="tracker-footer">
        <div class="completion-bar-wrap">
          <div class="completion-label">
            <span>Completamento</span>
            <span id="completion-pct">0%</span>
          </div>
          <div class="completion-bar"><div class="completion-fill" id="completion-fill"></div></div>
        </div>
        <button class="btn-save" onclick="saveSession()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Salva sessione
        </button>
      </div>
    </div>

    <!-- PAGE: HISTORY -->
    <div id="page-history" class="page">
      <div class="page-header">
        <div><h1 class="page-title">Storico</h1><p class="page-sub">Tutte le sessioni salvate</p></div>
        <div class="filter-row">
          <select class="select-sm" id="history-filter-user" onchange="loadHistory()">
            <option value="">Tutti gli utenti</option>
          </select>
          <select class="select-sm" id="history-filter-all" onchange="loadHistory()">
            <option value="">Tutti gli allenamenti</option>
            <option value="0">Allenamento 1</option>
            <option value="1">Allenamento 2</option>
            <option value="2">Allenamento 3</option>
          </select>
        </div>
      </div>
      <div id="history-list" class="history-list">
        <div class="empty-state">Seleziona filtri e carica lo storico</div>
      </div>
    </div>

    <!-- PAGE: STATS -->
    <div id="page-stats" class="page">
      <div class="page-header">
        <div><h1 class="page-title">Progressi</h1><p class="page-sub">Evoluzione dei carichi</p></div>
        <div class="filter-row">
          <select class="select-sm" id="stats-filter-user" onchange="loadStats()">
            <option value="">Il mio profilo</option>
          </select>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid">
        <div class="empty-state">Caricamento statistiche...</div>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
